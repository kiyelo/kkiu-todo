<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<title>Kkiu To Do — v17 Liquid Glass</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
<style>
  :root{
    --paper:#fbf8f2; --surface:#fff; --ink:#1c1a17; --ink2:#46423b; --sub:#938c80; --faint:#bdb6a8;
    --hair:#efe9dd; --accent:#e0894a; --accent-soft:#fbe9d5; --accent-ink:#a85e26; --danger:#c75b4e;
    --r:16px; --nav-h:62px; --safe:env(safe-area-inset-bottom,0px);
    --sh-card:0 1px 2px rgba(70,55,30,.06),0 6px 18px rgba(70,55,30,.07);
    --sh-slot:0 14px 34px rgba(80,55,25,.18); --sh-pop:0 26px 70px rgba(50,40,20,.22);
    --font:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,system-ui,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden}
  body{font-family:var(--font);color:var(--ink);-webkit-font-smoothing:antialiased;
    background:linear-gradient(168deg,#efe9dd,#f7f2e9 46%,#ece5d8);display:grid;place-items:center;padding:24px 14px}
  button,input,textarea{font:inherit;color:inherit}
  button{-webkit-tap-highlight-color:transparent;cursor:pointer;border:0;background:none}
  .wrap{width:min(100%,416px)}
  .phone{position:relative;width:100%;height:min(884px,calc(100vh - 48px));min-height:680px;display:flex;flex-direction:column;
    overflow:hidden;border-radius:46px;background:var(--paper);border:1px solid rgba(70,55,30,.06);box-shadow:var(--sh-pop)}
  .phone::before{content:"";position:absolute;z-index:60;top:12px;left:50%;width:104px;height:28px;transform:translateX(-50%);border-radius:999px;background:rgba(70,55,30,.05)}
  #app{flex:1;display:flex;flex-direction:column;min-height:0}
  #viewport{flex:1;min-height:0;position:relative;overflow:hidden}
  .vpage{position:absolute;inset:0;display:flex;flex-direction:column;min-height:0;will-change:transform;background:var(--paper)}

  .head{flex:none;padding:46px 24px 10px;transition:padding .2s ease}
  .headrow{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .ttl{margin:0;font-size:32px;font-weight:700;letter-spacing:-.03em;line-height:1.05}
  .head-sub{margin:7px 0 0;font-size:13px;font-weight:560;color:var(--sub);letter-spacing:-.01em}
  .head-sub .meta-link{margin:0;padding:0;color:var(--accent-ink);font-size:inherit;font-weight:750;text-decoration:underline;text-underline-offset:3px}
  .hicons{display:flex;gap:8px;margin-top:5px}
  .hbtn{position:relative;width:38px;height:38px;border-radius:13px;background:rgba(70,55,30,.05);display:grid;place-items:center;color:var(--ink2);transition:.15s}
  .hbtn:active{transform:scale(.92)} .hbtn svg{width:18px;height:18px}
  .hbadge{position:absolute;top:-4px;right:-5px;min-width:17px;height:17px;padding:0 4px;border-radius:9px;background:var(--accent);color:#fff;font-size:10px;font-weight:800;display:grid;place-items:center}
  .mini-badge{display:inline-grid;place-items:center;min-width:18px;height:18px;padding:0 6px;margin-left:5px;border-radius:9px;background:var(--accent-soft);color:var(--accent-ink);font-size:10.5px;font-weight:800;vertical-align:1px}
  .chips{flex:none;display:flex;gap:7px;padding:2px 24px 10px;flex-wrap:wrap}
  .chip{display:flex;align-items:center;gap:6px;height:34px;padding:0 12px 0 6px;border-radius:999px;background:var(--surface);box-shadow:var(--sh-card);font-size:12.5px;font-weight:700;color:var(--sub);transition:.15s}
  .chip .av{width:28px;height:28px;display:grid;place-items:center;background:transparent!important;color:inherit!important;font-size:19px;font-weight:400}
  .chip.on{background:var(--accent-soft);color:var(--accent-ink);box-shadow:0 0 0 1.5px var(--accent) inset}
  .vpage.compact-head .head{padding-top:18px!important;padding-bottom:7px!important}
  .vpage.compact-head .head-sub{max-height:0;margin-top:0;opacity:0;overflow:hidden}
  .vpage.compact-head .ttl{font-size:25px}
  .circle-head .headrow>div:first-child{flex:1;min-width:0}
  .circle-head .hicons{flex:none;gap:4px;margin-top:0}
  .circle-head .hbtn{width:34px;height:34px;border-radius:11px}

  .stage{flex:1;min-height:0;position:relative;overflow:hidden}
  .stage.q{touch-action:none}
  .stage.q.adding .ico.grip{opacity:.28;pointer-events:none;transition:opacity .18s}
  .qvp{position:absolute;inset:0;overflow:hidden}
  .qtrack{position:absolute;left:0;right:0;top:0;padding:0 18px;will-change:transform}
  .qtrack>*{position:absolute!important;left:18px;right:18px;margin:0!important;transition:transform .19s cubic-bezier(.2,.7,.3,1)}
  .qfade{position:absolute;left:0;right:0;z-index:6;pointer-events:none}
  .qfade.t{top:0;height:40px;background:linear-gradient(to bottom,var(--paper) 16%,transparent)}
  .qfade.b{bottom:0;height:calc(var(--nav-h) + 64px + var(--safe));background:linear-gradient(to top,var(--paper) 52%,transparent)}

  .card{position:relative;display:grid;grid-template-columns:24px 1fr auto;gap:11px;align-items:center;height:62px;
    margin-bottom:10px;padding:0 14px 0 16px;border-radius:var(--r);background:var(--surface);box-shadow:var(--sh-card);
    user-select:none;transition:transform .19s cubic-bezier(.2,.7,.3,1),box-shadow .16s,opacity .26s ease}
  .card.hasrank{grid-template-columns:24px 30px 1fr auto;gap:9px;padding-left:15px}
  .card.lift{box-shadow:0 16px 40px rgba(60,45,25,.26);z-index:20}
  .card.leaving{opacity:0}
  .card.sel-on{box-shadow:0 0 0 2px var(--accent),var(--sh-card)}
  .card.t1{background:#fffdf8}
  .ck{width:24px;height:24px;border-radius:50%;border:2px solid #ddd6c7;background:transparent;display:grid;place-items:center;color:transparent;transition:.16s}
  .ck:hover{border-color:var(--accent)}.ck:active{transform:scale(.9)}
  .ck.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .ck.pop{animation:ckpop .34s ease}
  @keyframes ckpop{0%{transform:scale(.5)}55%{transform:scale(1.22)}100%{transform:scale(1)}}
  .ck svg{width:12px;height:12px}
  .selbox{width:24px;height:24px;border-radius:7px;border:2px solid #ddd6c7;display:grid;place-items:center;color:transparent;transition:.14s}
  .selbox.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .selbox svg{width:13px;height:13px}
  .rank{font-size:13px;font-weight:700;color:var(--faint);font-variant-numeric:tabular-nums;text-align:center;letter-spacing:-.04em}
  .rank.top{padding:3px 0;border-radius:9px;background:var(--accent-soft);color:var(--accent-ink);font-weight:800}
  .card.t1 .rank{background:var(--accent);color:#fff;box-shadow:0 3px 8px rgba(224,137,74,.35)}
  .mid{min-width:0;display:flex;flex-direction:column;justify-content:center;position:relative}
  .t-title{margin:0;font-size:15.5px;font-weight:580;letter-spacing:-.02em;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
  .t-rest{margin:1px 0 0;font-size:11.5px;font-weight:530;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
  .card.t1 .t-title{font-weight:680}
  .t-title[contenteditable="true"]{white-space:normal;overflow-wrap:anywhere;word-break:break-word;text-overflow:clip;overflow-y:auto;max-height:4.2em;outline:none;border-bottom:2px solid var(--accent);padding-bottom:2px}
  .card.editing{height:auto;min-height:62px;padding-top:11px;padding-bottom:11px;z-index:60;box-shadow:0 14px 34px rgba(60,45,25,.22)}
  .card.editing .t-rest{display:none}
  .editasg{display:flex;align-items:center;gap:6px;margin-top:9px;flex-wrap:wrap}
  .editasg .asgc{height:28px;padding:0 9px 0 4px;font-size:11.5px;box-shadow:none;background:rgba(70,55,30,.06)}
  .editasg .asgc.on{background:var(--accent-soft);color:var(--accent-ink);box-shadow:0 0 0 1.5px var(--accent) inset}
  .editasg .asgc .av{width:26px;height:26px;font-size:18px}
  .sub{margin-top:2px;font-size:11px;font-weight:560;color:var(--faint)}
  .acts{display:flex;align-items:center;gap:1px}
  .ico{width:32px;height:32px;border-radius:9px;color:var(--faint);display:grid;place-items:center;opacity:.7;transition:.14s}
  .ico:hover{background:#f4eee2;opacity:1}
  .ico svg{width:16px;height:16px;pointer-events:none}
  .ico.fav{width:40px;height:40px}.ico.fav svg{width:24px;height:24px}
  .ico.fav:active{transform:scale(.85)}.ico.fav.on{color:var(--accent);opacity:1}
  .ico.grip{color:#d2cabb;cursor:grab;touch-action:none}.ico.grip:active{cursor:grabbing}
  .who{width:28px;height:28px;display:grid;place-items:center;background:transparent!important;color:inherit!important;font-size:19px;font-weight:400;flex:none;margin:0 2px}

  .ghostrow{height:42px;display:flex;align-items:center;gap:9px;padding:0 14px;border-radius:13px;background:rgba(255,255,255,.55);opacity:.62}
  .ghostrow .grank{font-size:11.5px;font-weight:800;color:var(--faint);min-width:26px;font-variant-numeric:tabular-nums}
  .ghostrow .gtitle{flex:1;min-width:0;font-size:13px;font-weight:540;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ghostrow .who{width:24px;height:24px;font-size:16px;margin:0}
  .bundle{height:46px;display:flex;align-items:center;justify-content:center;gap:7px;border-radius:13px;border:1.6px dashed #d9d1c0;background:rgba(255,255,255,.4);color:var(--sub);font-size:12.5px;font-weight:700}
  .bundle b{color:var(--accent-ink)}
  .colbar{height:34px;display:flex;align-items:center;justify-content:center;gap:6px;border-radius:11px;background:rgba(70,55,30,.07);color:var(--ink2);font-size:12px;font-weight:750}
  .adcard{height:62px;display:grid;grid-template-columns:auto 44px 1fr;gap:11px;align-items:center;padding:0 14px;border-radius:var(--r);background:repeating-linear-gradient(-45deg,#fffdf8,#fffdf8 8px,#faf5ea 8px,#faf5ea 16px);border:1px dashed #e4dccb}
  .adtag{font-size:9.5px;font-weight:800;letter-spacing:.06em;color:var(--faint);border:1.2px solid #ddd5c4;border-radius:6px;padding:2px 5px}
  .adthumb{width:44px;height:44px;border-radius:11px;background:linear-gradient(135deg,#ece4d3,#f6efe1)}
  .admid{min-width:0}
  .admid p{margin:0;font-size:13px;font-weight:620;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .admid .adsub{font-size:10.5px;font-weight:550;color:var(--faint);margin-top:2px}
  .donebtn{height:46px;display:flex;align-items:center;justify-content:center;gap:7px;border-radius:14px;background:rgba(70,55,30,.05);color:var(--ink2);font-size:13px;font-weight:700}

  .slotwrap{position:absolute;left:0;right:0;z-index:30;transform:translateY(-50%);padding:0 22px;transition:opacity .16s}
  .ins{position:relative;width:100%;height:46px;display:flex;align-items:center;justify-content:center;gap:8px;border-radius:23px;
    background:var(--surface);box-shadow:var(--sh-slot);font-size:13.5px;font-weight:650;color:var(--ink2);letter-spacing:-.02em;transition:transform .14s}
  .ins:active{transform:scale(.985)}
  .ins .p{display:grid;place-items:center;width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;font-size:16px;font-weight:600;line-height:1;padding-bottom:1px}
  .ins b{color:var(--accent-ink);font-weight:800}
  .ibar{display:none;align-items:center;gap:10px;padding:8px 8px 8px 14px;border-radius:18px;background:var(--surface);box-shadow:var(--sh-slot)}
  .slotwrap.open .ins{display:none}.slotwrap.open .ibar{display:flex}
  .ipos{flex:none;min-width:30px;height:34px;padding:0 9px;border-radius:11px;background:var(--accent-soft);color:var(--accent-ink);display:grid;place-items:center;font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.03em}
  .si{flex:1;min-width:0;box-sizing:border-box;min-height:34px;max-height:78px;border:0;outline:0;background:transparent;font-size:16px;font-weight:560;letter-spacing:-.02em;resize:none;font-family:inherit;line-height:1.3;padding:6px 0;overflow-y:hidden;overflow-wrap:anywhere}
  .si::placeholder{color:var(--faint);font-weight:500}
  .save{flex:none;width:44px;height:44px;border-radius:14px;background:var(--accent);color:#fff;display:grid;place-items:center;box-shadow:0 8px 16px rgba(224,137,74,.32);transition:.15s}
  .save:hover{filter:brightness(1.04)}.save:active{transform:scale(.9)}.save svg{width:19px;height:19px}
  .ibar{position:relative}
  .asgrow{position:absolute;z-index:4;bottom:calc(100% + 10px);left:2px;right:2px;max-width:calc(100vw - 34px);display:flex;align-items:center;gap:5px;overflow-x:auto;overscroll-behavior-x:contain;touch-action:pan-x;scrollbar-width:none;padding:2px 0}
  .asgrow::-webkit-scrollbar{display:none}
  .asglb{height:32px;display:grid;place-items:center;padding:0 10px;border-radius:999px;background:var(--surface);box-shadow:var(--sh-slot);font-size:10.5px;font-weight:750;color:var(--faint)}
  .asgc{display:flex;align-items:center;gap:6px;height:32px;padding:0 11px 0 5px;border-radius:999px;background:var(--surface);box-shadow:var(--sh-slot);font-size:12px;font-weight:700;color:var(--sub);transition:.15s}
  .asgc .av{width:28px;height:28px;display:grid;place-items:center;background:transparent!important;color:inherit!important;font-size:19px;font-weight:400}
  .asgc.compact{flex:none;width:36px;height:36px;padding:0;justify-content:center;border-radius:12px}
  .asgrow .asgc{flex:none;white-space:nowrap;background:var(--paper);box-shadow:var(--sh-card)}
  .asgrow .asgc.on{background:var(--paper);color:var(--accent-ink);box-shadow:0 0 0 1.5px var(--accent) inset,var(--sh-card)}
  .asgc.on{background:var(--accent-soft);color:var(--accent-ink);box-shadow:0 0 0 1.5px var(--accent) inset,var(--sh-slot)}
  .asgc.dft{background:transparent;box-shadow:none;border:1.6px dashed var(--faint);color:var(--faint)}
  .asgc:active{transform:scale(.95)}
  .devq{background:var(--surface);border-radius:16px;padding:10px 12px;box-shadow:0 2px 10px rgba(60,45,25,.07);display:flex;flex-direction:column;gap:6px}
  .devhd{font-size:12px;font-weight:800;color:var(--faint);letter-spacing:.02em;padding:2px 2px 0}
  .devrow{display:flex;align-items:center;gap:9px;height:38px;padding:0 8px;border-radius:10px;background:rgba(70,55,30,.04);font-size:13.5px;font-weight:600;color:var(--ink)}
  .devrow.coffee{background:var(--accent-soft);color:var(--accent-ink);animation:rowin .26s ease}
  .drank{width:20px;height:20px;border-radius:7px;background:rgba(70,55,30,.08);display:grid;place-items:center;font-size:11px;font-weight:800;color:var(--sub);flex:none}
  .devrow.coffee .drank{background:var(--accent);color:#fff}
  .devins{display:flex;align-items:center;gap:8px;height:38px;padding:0 8px;border-radius:10px;border:1.6px dashed var(--accent);color:var(--accent-ink);font-size:13px;font-weight:700;background:var(--accent-soft)}
  .devins:active{transform:scale(.98)}
  .moreslotwrap{position:absolute;left:16px;right:16px;top:120px;z-index:40;pointer-events:none;transition:top .2s cubic-bezier(.2,.7,.3,1)}
  .moreslotwrap .quip{width:100%;height:44px;display:flex;align-items:center;justify-content:center;gap:8px;border-radius:22px;background:var(--surface);box-shadow:var(--sh-slot);color:var(--ink2);font-size:13px;font-weight:700;letter-spacing:-.02em;pointer-events:auto}
  .moreslotwrap .quip:active{transform:scale(.985)}
  .moreslotwrap .quip .dice{font-size:18px}
  .more-anchor{height:0;pointer-events:none;transition:height .2s cubic-bezier(.2,.7,.3,1)}
  .more-anchor.active{height:44px}
  .buildtag{position:absolute;right:10px;bottom:6px;font-size:10px;font-weight:700;letter-spacing:.02em;color:rgba(70,55,30,.16);z-index:5;pointer-events:none;user-select:none}

  .scroller{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;padding:6px 18px calc(var(--nav-h) + 30px + var(--safe));touch-action:pan-y}
  .scroller::-webkit-scrollbar{display:none}
  .stage>.scroller{position:absolute;inset:0}
  .list{display:flex;flex-direction:column;gap:10px}
  .list .card{height:auto;min-height:62px;padding:13px 16px;margin:0;animation:rowin .26s ease}
  @keyframes rowin{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  .list .card.hasrank{padding-left:15px}
  .list .t-title{white-space:normal;overflow-wrap:anywhere}
  .empty{display:grid;place-items:center;min-height:200px;padding:16px}
  .empty-c,.pcard{width:100%;padding:30px 26px;border-radius:20px;background:var(--surface);box-shadow:var(--sh-card)}
  .empty-c{text-align:center}
  .empty-c h3{margin:0 0 7px;font-size:18px;font-weight:680;letter-spacing:-.03em}
  .empty-c p{margin:0;font-size:13px;line-height:1.6;font-weight:560;color:var(--sub);word-break:keep-all}
  .queueempty{position:absolute;left:18px;right:18px;top:15%;z-index:2;text-align:center;pointer-events:none}
  .queueempty .empty-c{padding:24px 20px}.queueempty .empty-c p{margin-bottom:14px}
  .queueempty button{pointer-events:auto;height:38px;padding:0 14px;border-radius:12px;background:var(--accent-soft);color:var(--accent-ink);font-size:12.5px;font-weight:800}
  .pcard{padding:17px 18px}
  .pcard h3{margin:0 0 6px;font-size:15px;font-weight:680;letter-spacing:-.02em}
  .pcard p{margin:0;font-size:12.5px;line-height:1.6;font-weight:560;color:var(--sub);word-break:keep-all}
  .field{width:100%;background:var(--surface);border:0;border-radius:14px;padding:13px 15px;font-size:15px;font-weight:560;outline:0;box-shadow:var(--sh-card)}
  .field:focus{box-shadow:0 0 0 2px var(--accent),var(--sh-card)}
  textarea.field{min-height:100px;resize:vertical;font-family:ui-monospace,Menlo,monospace;font-size:12px;font-weight:500}
  .rbtn{width:100%;display:flex;justify-content:space-between;align-items:center;background:var(--surface);border-radius:14px;padding:14px 16px;font-size:14px;font-weight:600;box-shadow:var(--sh-card);color:var(--ink);transition:.15s}
  .rbtn span{color:var(--faint)}.rbtn:hover{color:var(--accent-ink)}.rbtn:active{transform:scale(.98)}.rbtn.danger:hover{color:var(--danger)}
  .rbtn em{font-style:normal;font-size:11px;font-weight:650;color:var(--faint);margin-left:6px}
  mark{background:var(--accent-soft);border-radius:4px;padding:0 2px;color:var(--accent-ink)}

  .srow{display:flex;align-items:center;gap:10px;background:var(--surface);border-radius:13px;box-shadow:var(--sh-card);padding:12px}
  button.srow{width:100%;color:var(--ink);font:inherit;text-align:left;cursor:pointer}
  button.srow:active{transform:scale(.985)}
  .srow .rankc{min-width:34px;height:24px;border-radius:8px;background:var(--accent-soft);color:var(--accent-ink);font-size:12px;font-weight:800;display:grid;place-items:center;font-variant-numeric:tabular-nums}
  .srow .stt{flex:1;min-width:0;font-size:14px;font-weight:580;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .srow.donem .stt{color:var(--faint);text-decoration:line-through}
  .srow.donem .rankc{background:rgba(70,55,30,.06);color:var(--faint)}

  .sheetwrap{position:absolute;inset:0;z-index:70;visibility:hidden}
  .sheetwrap.on{visibility:visible}
  .scrim{position:absolute;inset:0;background:rgba(30,25,18,.34);opacity:0;transition:opacity .24s}
  .sheetwrap.on .scrim{opacity:1}
  .sheet{position:absolute;left:0;right:0;bottom:0;max-height:80%;display:flex;flex-direction:column;border-radius:26px 26px 0 0;background:var(--paper);box-shadow:0 -20px 60px rgba(50,40,20,.28);transform:translateY(103%);transition:transform .3s cubic-bezier(.22,.72,.25,1)}
  .sheetwrap.on .sheet{transform:none}
  .sheet .grab{flex:none;width:44px;height:5px;border-radius:3px;background:#ded6c5;margin:10px auto 2px}
  .sheethead{flex:none;display:flex;align-items:center;justify-content:space-between;padding:8px 20px 10px}
  .sheethead b{font-size:17px;font-weight:750;letter-spacing:-.02em}
  .sheethead .mini{font-size:11.5px;font-weight:650;color:var(--sub);text-align:right}
  .sheethead .mini u{display:block;text-decoration:none;color:var(--accent-ink);font-weight:750;cursor:pointer}
  .sheetbody{flex:1;min-height:0;overflow-y:auto;padding:0 18px calc(18px + var(--safe));scrollbar-width:none}
  .sheetbody::-webkit-scrollbar{display:none}

function buildQueueModel(tasks,opts={}){
 const rows=[],slots=[];let y=0;
 tasks.forEach((t,i)=>{
  // A task's insertion point must come before its anchored ad. Otherwise the
  // gap directly above an ad can never be selected for adding a new task.
  slots.push({y,gi:i});
  if(opts.ads&&isAdBefore(i)){
   rows.push({kind:"ad",y,h:CARD_H,anchor:i});y+=UNIT;
   // The same task rank is also reachable below its ad, before the task card.
   slots.push({y,gi:i});
  }
  rows.push({kind:"task",task:t,ti:i,y,h:CARD_H});y+=UNIT});
 slots.push({y,gi:tasks.length});
 if(opts.doneBtn){y+=6;rows.push({kind:"doneBtn",y,h:46});y+=DBTN_U}
 return{rows,slots,totalH:y}}
function buildCircleModel(){
 const full=ciActive(),f=state.ciFilter;
 if(!f)return addCircleDoneButton(buildQueueModel(full,{ads:true}));
 const rows=[],slots=[];let y=0;
 const pushSlot=gi=>{const last=slots[slots.length-1];if(!last||last.gi!==gi)slots.push({y,gi})};
 if(!state.ciGhosts){
  full.forEach((t,gi)=>{if((t.assignees||[]).includes(f)){pushSlot(gi);rows.push({kind:"task",task:t,ti:gi,y,h:CARD_H});y+=UNIT}});
  slots.push({y,gi:full.length});
 }else{
  let i=0;
  while(i<full.length){
   const t=full[i];
   if((t.assignees||[]).includes(f)){pushSlot(i);rows.push({kind:"task",task:t,ti:i,y,h:CARD_H});y+=UNIT;i++}
   else{let j=i;while(j<full.length&&!(full[j].assignees||[]).includes(f))j++;
    const key=i+"-"+j,len=j-i;
    if(len<3||state.ciExpanded===key){
     if(len>=3){rows.push({kind:"collapse",key,from:i,to:j,y,h:COL_H});y+=COL_U}
     for(let k=i;k<j;k++){pushSlot(k);rows.push({kind:"ghost",task:full[k],ti:k,y,h:GHOST_H});y+=GHOST_U}
    }else{pushSlot(i);rows.push({kind:"bundle",key,from:i,to:j,count:len,y,h:BND_H});y+=BND_U}
    i=j}}
  slots.push({y,gi:full.length});
 }
 return addCircleDoneButton({rows,slots,totalH:y})}

function computeStreak(){const days=new Set(state.doneLog.map(l=>{const d=new Date(l.completedAt);d.setHours(0,0,0,0);return d.getTime()}));
 let d=new Date();d.setHours(0,0,0,0);if(!days.has(d.getTime()))d.setTime(d.getTime()-864e5);
 let streak=0;while(days.has(d.getTime())){streak++;d.setTime(d.getTime()-864e5)}
 return streak}
function weekBars(){const arr=[],d0=new Date();d0.setHours(0,0,0,0);
 for(let i=6;i>=0;i--){const day=d0.getTime()-i*864e5;const cnt=state.doneLog.filter(l=>{const t=new Date(l.completedAt);t.setHours(0,0,0,0);return t.getTime()===day}).length;arr.push({day,cnt})}
 return arr}
function oldestActive(n){const all=[...state.tasks.filter(t=>!t.done),...state.circles.flatMap(c=>c.tasks.filter(t=>!t.done))];
 return all.sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt)).slice(0,n)}
function statsView(){
 const log=state.doneLog,n=log.length;
 let leadTxt="–";
 if(n){const avg=log.reduce((s,l)=>s+(l.leadMs||0),0)/n;const hrs=avg/3600e3;
  leadTxt=hrs>=48?(hrs/24).toFixed(1)+(state.lang==="en"?"d":"일"):hrs.toFixed(1)+(state.lang==="en"?"h":"시간")}
 const totalActive=active().length+state.circles.reduce((s,c)=>s+c.tasks.filter(t=>!t.done).length,0);
 const streak=computeStreak();
 const wb=weekBars(),maxW=Math.max(1,...wb.map(b=>b.cnt));
 const wd=state.lang==="en"?["S","M","T","W","T","F","S"]:["일","월","화","수","목","금","토"];
 const old=oldestActive(3);
 return `<div class="scroller"><div class="list">
 <div class="statrow2">
  <div class="statcard"><h4>${T("stTotal")}</h4><div class="big">${n}</div><p>${T("stTotalP")}</p></div>
  <div class="statcard"><h4>${T("stActive")}</h4><div class="big">${totalActive}</div><p>${T("stActiveP")}</p></div></div>
 <div class="statcard"><h4>${T("stStreak")}</h4><div class="big">${streak}${state.lang==="en"?"d":"일"}</div><p>${streak>0?T("stStreakP"):T("stStreakP0")}</p></div>
 <div class="statcard"><h4>${T("stWeek")}</h4><div class="weekbars">${wb.map(b=>`<div class="wbar"><i style="height:${Math.max(4,Math.round(b.cnt/maxW*54))}px"></i><span>${wd[new Date(b.day).getDay()]}</span></div>`).join("")}</div></div>
 <div class="statcard"><h4>${T("stLead")}</h4><div class="big">${leadTxt}</div><p>${T("stLeadP")}</p></div>
 ${old.length?`<div class="statcard"><h4>${T("stOld")}</h4><p>${T("stOldP")}</p>${old.map(t=>`<div class="oldrow"><span class="oldtitle">${esc(t.title)}</span><span class="oldbadge">D+${Math.max(0,Math.floor((Date.now()-new Date(t.createdAt))/864e5))}</span></div>`).join("")}</div>`:""}
 </div></div>`}

  if(document.caretRangeFromPoint)range=document.caretRangeFromPoint(ev.clientX,ev.clientY);

 if(act==="circle-del"){const c=curC();if(!c)return;askConfirm(T("circleDel"),T("circleDelConfirm",{n:c.name}),T("circleDel"),()=>{state.circles.splice(state.ci,1);state.ci=0;state.ciFilter=null;state.ciGhosts=false;state.ciExpanded=null;state.ciInsertIndex=0;save();closeSheet();renderView();toast(T("tCircleDel"))},true);return}
 if(act==="asg-pick"){const k=el.dataset.m;ciAssignees=new Set([k]);viewEl.querySelectorAll(".asgrow .asgc").forEach(b=>b.classList.toggle("on",b.dataset.m===k));return}
 if(act==="add-submit"){submitAdd();return}
 if(act==="quip-next"){const q=viewEl.querySelector("#quipTxt");if(q){const a=state.lang==="en"?["One thing at a time","Tiny progress still counts","Leave a little room for later","Today can stay unfinished","A queue is not a verdict"]:["한 번에 하나씩이면 충분해요","작은 진척도 진척이에요","나중의 나를 위한 빈자리","오늘이 덜 끝나도 괜찮아요","줄은 평가표가 아니에요"];moreQuipIndex=(moreQuipIndex+1)%a.length;q.textContent=a[moreQuipIndex];vibe(8)}return}
 if(act==="mslot-open"){return}
 if(act==="quick-target"){moreTarget=el.dataset.target;viewEl.querySelectorAll("#mIbar [data-act='quick-target']").forEach(b=>b.classList.toggle("on",b.dataset.target===moreTarget));return}
 if(act==="mfeat-submit"){submitFeat();return}
 if(act==="chip"){ciAssignees=new Set();state.ciFilter=el.dataset.m||null;state.ciGhosts=false;state.ciExpanded=null;state.ciInsertIndex=0;if(el.dataset.m){const c=curC();if(c?.memberUnread)c.memberUnread[el.dataset.m]=0}save();buildQueue("circle");return}
 if(act==="empty-all"){state.ciFilter=null;state.ciGhosts=false;state.ciExpanded=null;buildQueue("circle");return}
 if(act==="modal-cancel"){closeModal();return}
 if(act==="modal-ok"){const v=document.getElementById("modalIn")?.value;const cb=modalOkCb;closeModal();cb&&cb(v);return}
 if(act==="modal-clear-confirm"){const ids=[...document.querySelectorAll(".clrow input:checked")].map(i=>i.dataset.id);closeModal();if(ids.length)sheetClear(ids.join(","));return}
 if(act==="lang"){setLang(el.dataset.lang);return}
 if(act==="stub"){toast(T("tSoon"));return}
 if(act==="title"){if(selecting)toggleSelect(id);else startEdit(el,id,e);return}
 if(act==="sel"){toggleSelect(id);return}
 if(selecting&&e.target.closest(".card")){toggleSelect(id);return}
 if(act==="complete")complete(id);else if(act==="fav")favorite(id);
 else if(act==="sel-delete")deleteSelected();else if(act==="sel-cancel")cancelSelect();else if(act==="sel-all")selectAll();
 else if(act==="export")exportJson();else if(act==="import")importJson();else if(act==="reset")resetAll();
 else if(act==="link")toast(T("tLink"))});
function submitAdd(){const si=viewEl.querySelector("#si");if(!si)return;const v=si.value;si.value="";autoGrowSi(si);state.tab==="circle"?ciAdd(v):addTask(v)}
function submitFeat(){const w=viewEl.querySelector("#moreSlotWrap"),ta=w?.querySelector("#msi"),v=(ta?.value||"").trim();if(!v){w?.classList.remove("open");return}
 if(moreTarget==="circle"&&curC()){
  const c=curC();c.tasks.filter(t=>!t.done).forEach(t=>t.order++);c.tasks.push({id:uid(),title:v.slice(0,120),assignees:["me"],favorite:false,done:false,order:0,createdAt:now(),completedAt:null});ciReindex()
 }else{
  state.tasks.filter(t=>!t.done).forEach(t=>t.order++);state.tasks.push({id:uid(),title:v.slice(0,120),favorite:false,done:false,order:0,createdAt:now(),completedAt:null,insertAt:0,listAt:active().length,doneAt:null});reindex()
 }
 save();if(ta)ta.value="";w?.classList.remove("open");vibe([10,16,10]);toast(state.lang==="en"?"Kkiu'd it at the top":"맨 앞에 끼웠어요");if(state.tab==="more")renderView()}
function wireMoreSlot(){const sc=viewEl.querySelector(".scroller"),slot=viewEl.querySelector("#moreSlotWrap");if(!sc||!slot)return;
 const place=()=>{const anchors=[...viewEl.querySelectorAll(".more-anchor")];if(!anchors.length)return;const desired=sc.scrollTop+sc.clientHeight*.46;let best=anchors[0],dist=Infinity;anchors.forEach(a=>{const y=a.getBoundingClientRect().top-sc.getBoundingClientRect().top+sc.scrollTop;const d=Math.abs(y-desired);if(d<dist){best=a;dist=d}});if(!best.classList.contains("active")){anchors.forEach(a=>a.classList.toggle("active",a===best));requestAnimationFrame(place);return}const y=best.getBoundingClientRect().top-sc.getBoundingClientRect().top+sc.scrollTop;slot.style.top=Math.max(70,y-sc.scrollTop)+"px";viewEl.classList.toggle("compact-head",sc.scrollTop>44)};
 sc.addEventListener("scroll",place,{passive:true});requestAnimationFrame(place)}
app.addEventListener("submit",e=>{
 if(e.target.id==="addForm"){e.preventDefault();submitAdd();return}
 if(e.target.id==="modalForm"){e.preventDefault();const v=document.getElementById("modalIn")?.value||"";const cb=modalOkCb;closeModal();cb&&cb(v);return}
});
function openModal(html){document.getElementById("modal").innerHTML=html;document.getElementById("modalwrap").classList.add("on")}
function closeModal(){document.getElementById("modalwrap").classList.remove("on");modalOkCb=null}
function askConfirm(title,msg,okLabel,cb,danger){modalOkCb=cb;
 openModal(`<h3>${esc(title)}</h3><p>${esc(msg)}</p><div class="mrow"><button type="button" class="mbtn" data-act="modal-cancel">${T("cancel")}</button><button type="button" class="mbtn ${danger?"danger":"primary"}" data-act="modal-ok">${esc(okLabel)}</button></div>`)}
function askPrompt(title,placeholder,cb,dflt){modalOkCb=cb;
 openModal(`<h3>${esc(title)}</h3><form id="modalForm" autocomplete="off"><input id="modalIn" placeholder="${esc(placeholder||"")}" value="${esc(dflt||"")}"/><div class="mrow"><button type="button" class="mbtn" data-act="modal-cancel">${T("cancel")}</button><button type="button" class="mbtn primary" data-act="modal-ok">${T("create")}</button></div></form>`);
 setTimeout(()=>{const mi=document.getElementById("modalIn");if(!mi)return;mi.focus();mi.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.isComposing){e.preventDefault();const v=mi.value,cb=modalOkCb;closeModal();cb&&cb(v)}})},60)}
function openClearModal(arr){
 openModal(`<h3>${T("clearModalT")}</h3><div class="clist">${arr.map(t=>`<label class="clrow"><input type="checkbox" checked data-id="${t.id}"/><span>${esc(t.title)}</span></label>`).join("")}</div><div class="mrow"><button type="button" class="mbtn" data-act="modal-cancel">${T("cancel")}</button><button type="button" class="mbtn danger" data-act="modal-clear-confirm">${T("clear")}</button></div>`)}
window.addEventListener("resize",()=>{moveInd();if(isQueue()&&!slotOpen&&!selecting)buildQueue(state.tab==="circle"?"circle":"home",true)});
mount();
</script>
